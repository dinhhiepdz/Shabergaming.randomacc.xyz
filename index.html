<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Random Acc Liên Quân</title>

<style>

*{box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
touch-action:none;
background:linear-gradient(270deg,#001aff,#ff0000,#6a00ff);
background-size:600% 600%;
animation:bgmove 10s infinite;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* TITLE */

.title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
background:linear-gradient(270deg,#00a2ff,#6a00ff,#4b0082);
background-size:400% 400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:titlemove 4s linear infinite;
}

@keyframes titlemove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MENU NEON */

.menu{
background:rgba(0,0,0,0.75);
padding:30px;
border-radius:14px;
width:340px;
min-height:480px;
text-align:center;
display:flex;
flex-direction:column;

border:2px solid #7a00ff;

box-shadow:
0 0 10px #7a00ff,
0 0 20px #7a00ff,
0 0 40px #7a00ff,
0 0 80px #7a00ff;

animation:neonGlow 2s infinite alternate;
}

@keyframes neonGlow{
from{
box-shadow:0 0 10px #7a00ff,0 0 20px #7a00ff,0 0 40px #7a00ff;
}
to{
box-shadow:0 0 20px #b100ff,0 0 40px #b100ff,0 0 80px #b100ff;
}
}

.count{
margin-bottom:10px;
color:#00ffcc;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
text-align:center;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.random{background:#00ffc3}
.copy{background:#ffd700}
.adminbtn{background:#ff3c3c}

.admin{
display:none;
margin-top:15px;
}

textarea{
width:100%;
height:90px;
margin-top:10px;
border-radius:6px;
padding:8px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:#111;
padding:25px;
border-radius:12px;
text-align:center;
width:320px;
}

/* chữ tím */

.popup-text{
font-size:20px;
font-weight:bold;
background:linear-gradient(270deg,#6a00ff,#b100ff,#4b0082);
background-size:400% 400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:textmove 4s infinite linear;
}

@keyframes textmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.acc-result{
margin-top:10px;
background:#000;
padding:10px;
border-radius:8px;
border:1px solid #7a00ff;
color:#ffd700;
}

</style>
</head>

<body>

<!-- popup chào -->
<div class="popup" id="popupWelcome">
<div class="popup-box">
<h2>Thông Báo</h2>
<p class="popup-text">
DONET 💵 
NGÂN HÀNG: ZALOPAY
STK:0386648761
CTK:LUONG VAN HIEP
TẤT CẢ ĐỀU MIỄN PHÍ NẾU BẠN CÓ TẤM LÒNG THÌ ADMIN XIN NHẬN❤️
WEB MAKE BỞI SHABER GAMING</p>
<button onclick="closeWelcome()">Đóng</button>
</div>
</div>

<!-- popup kết quả -->
<div class="popup" id="popupResult" style="display:none;">
<div class="popup-box">

<h3>TẤT CẢ ACC BẠN ĐÃ RANDOM</h3>

<div id="accResult" class="acc-result"></div>

<button onclick="copyAcc()">Copy</button>
<button onclick="closeResult()">Đóng</button>

</div>
</div>

<div class="menu">

<h2 class="title">SHABER04 TOOL RANDOM ACC LIÊN QUÂN</h2>

<div class="count">TẤT CẢ ACC CÒN LẠI: <span id="count"></span></div>

<input type="number" id="amount" placeholder="VUI LÒNG NHẬP SỐ ACC BẠN MUỐN RANDOM ">

<button class="random" onclick="randomAcc()">RANDOM</button>
<button class="adminbtn" onclick="loginAdmin()">Admin</button>

<div class="admin" id="adminPanel">

<h3>Panel Admin</h3>

<textarea id="newacc" placeholder="Tk | MK"></textarea>

<button onclick="addAcc()">Thêm Acc</button>

</div>

</div>

<script>

function closeWelcome(){
document.getElementById("popupWelcome").style.display="none";
}

function closeResult(){
document.getElementById("popupResult").style.display="none";
}

let adminPassword="vinhtien2007vip";

let defaultAcc=[
"acc01 | 123456",
"acc02 | 123456",
"acc03 | 123456",
"acc04 | 123456",
"acc05 | 123456"
];

let accounts=JSON.parse(localStorage.getItem("accounts"));

if(!accounts){
accounts=[...defaultAcc];
saveAcc();
}

function saveAcc(){
localStorage.setItem("accounts",JSON.stringify(accounts));
}

function updateCount(){
document.getElementById("count").innerText=accounts.length;
}

updateCount();

let lastResult="";

function randomAcc(){

let amount=parseInt(document.getElementById("amount").value);

if(amount>10){alert("TỐI ĐA 10 ACC");return;}
if(amount<1){alert("Nhập ít nhất 1");return;}
if(amount>accounts.length){alert("ĐÃ HẾT ACC");return;}

let result="";

for(let i=0;i<amount;i++){

let index=Math.floor(Math.random()*accounts.length);

result+=accounts[index]+"<br>";

accounts.splice(index,1);

}

saveAcc();

lastResult=result;

document.getElementById("accResult").innerHTML=result;

document.getElementById("popupResult").style.display="flex";

updateCount();

}

function copyAcc(){
navigator.clipboard.writeText(lastResult.replace(/<br>/g,"\n"));
alert("Đã copy");
}

function loginAdmin(){

let pass=prompt("Nhập mật khẩu admin");

if(pass===adminPassword){
document.getElementById("adminPanel").style.display="block";
}else{
alert("Sai mật khẩu");
}

}

function addAcc(){

let text=document.getElementById("newacc").value.split("\n");

text.forEach(acc=>{
if(acc.trim()!=""){
accounts.push(acc.trim());
}
});

saveAcc();

document.getElementById("newacc").value="";

updateCount();

alert("Đã thêm acc");

}

</script>

</body>
</html>
